name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Build package
        run: npm run build
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Upload coverage to Codecov
        if: matrix.node-version == 22
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Check package contents
        if: matrix.node-version == 22
        run: npm pack --dry-run

  react-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - react: '18'
            fiber: '8'
          - react: '19'
            fiber: '9'
    name: react-compat (React ${{ matrix.react }} / R3F ${{ matrix.fiber }})
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install React ${{ matrix.react }} / R3F ${{ matrix.fiber }}
        # --legacy-peer-deps: we intentionally override the lockfile-pinned
        # versions; the combos are known-compatible, but npm's strict peer
        # resolver flags the swap.
        run: |
          npm install --no-save --legacy-peer-deps \
            react@^${{ matrix.react }} \
            react-dom@^${{ matrix.react }} \
            @types/react@^${{ matrix.react }} \
            @types/react-dom@^${{ matrix.react }} \
            @react-three/fiber@^${{ matrix.fiber }}
      - name: Type check
        run: npm run typecheck
      - name: Run tests
        run: npm test
