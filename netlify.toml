# Netlify configuration for the examples sub-directory
[build]
# Base directory: where the build command is run
base = "examples"

# Build command
command = "npm run build"

# Publish directory: the folder with the built files (relative to 'base')
publish = "dist"

# vite 8 / @vitejs/plugin-react 6 require Node ^20.19 || >=22.12.
# Pin the deploy to current LTS so the engine floor is satisfied.
[build.environment]
NODE_VERSION = "22"
